<section class="studio-feedback" data-studio-feedback aria-labelledby="studio-feedback-heading">
  <h2 id="studio-feedback-heading">Your feedback</h2>
  <p class="subtitle">If numbered questions appear above, answer those first (they map to specific topics). Use this box only for anything else.</p>
  <label class="studio-sr-only" for="studio-feedback-text">Feedback</label>
  <textarea id="studio-feedback-text" class="studio-feedback-input" rows="5" maxlength="8000" placeholder="What should change? What's unclear? What do you prefer and why?"></textarea>
  <p class="studio-feedback-status" id="studio-feedback-status" role="status" aria-live="polite"></p>
  <div class="studio-actions studio-feedback-actions">
    <button type="button" class="studio-submit-feedback">Send feedback</button>
    <button type="button" class="studio-approve-screen">Approve screen</button>
    <button type="button" class="studio-unlock-screen" hidden>Unlock screen</button>
    <button type="button" class="studio-mark-done">Done reviewing</button>
  </div>
</section>
